<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>No Tilt Chess</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="hero">
        <p class="hero-brand">No Tilt Chess</p>

        <div class="hero-top">
          <div class="board-mini" aria-hidden="true">
            <div class="board-mini-grid"></div>
            <div class="board-mini-dot"></div>
          </div>

        <div class="hero-copy">
          <p class="status-chip" id="status-chip">Active</p>
          <h1 id="status-title">Watching for losses</h1>
        </div>
      </div>

      <p class="hero-text" id="status-copy">
          The extension watches Chess.com and locks access after one loss in the current day.
      </p>
      </header>

      <section class="status-panel" aria-label="Status">
        <div class="status-row">
          <span>Status</span>
          <strong id="status-value">Active</strong>
        </div>
        <div class="status-row">
          <span>Unlocks</span>
          <strong id="unlock-value">Immediate</strong>
        </div>
        <div class="status-row">
          <span>Scope</span>
          <strong>All Chess.com pages</strong>
        </div>
      </section>

      <section class="signal-strip" aria-label="Signals being watched">
        <p class="signal-kicker">Signals being watched</p>
        <div class="signal-grid">
          <span>Final result</span>
          <span>Negative rating</span>
          <span>Review / analysis</span>
        </div>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
